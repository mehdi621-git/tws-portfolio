version: 0.2

phases:
  pre_build:
    commands:
      - aws ecr get-login-password | docker login --username AWS --password-stdin 533267084857.dkr.ecr.eu-west-1.amazonaws.com/gocloudtasks
      - REPOSITORY_URI=533267084857.dkr.ecr.eu-west-1.amazonaws.com/gocloudtasks533267084857.dkr.ecr.eu-west-1.amazonaws.com/gocloudtasks
      - IMAGE_TAG=latest
  build:
    commands:
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .
      - docker push $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - printf '[{"name":"container","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
